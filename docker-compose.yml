version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: labtrack_mysql
    environment:
      MYSQL_ROOT_PASSWORD: labtrack123
      MYSQL_DATABASE: labtrackdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:7.0
    container_name: labtrack_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mysql_data:
  mongo_data: